name: Post Rates Canada to Cameroon

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update_rates:
    runs-on: ubuntu-latest

    steps:
    - name: Get Canada USDT/CAD Buy Rate from Bybit
      id: canada_buy
      run: |
        DATA=$(curl -s -X POST "https://api2.bybit.com/fiat/otc/item/online" \
          -H "Content-Type: application/json" \
          -H "User-Agent: Mozilla/5.0" \
          -d '{
            "userId": "",
            "tokenId": "USDT",
            "currencyId": "CAD",
            "side": "1",
            "size": "10",
            "page": "1",
            "payment": []
          }')

        AVG=$(echo "$DATA" | jq '[.result.items[0:3] | 
                .[] | select(.status==1 and .advertiser?.user?.advertising==false) | 
                (.price | tonumber)] | 
                if length > 0 then add / length else 1.36 end')

        echo "Canada Rate: $AVG CAD"
        echo "cad_rate=$AVG" >> $GITHUB_OUTPUT

    - name: Get Cameroon USDT/XAF Sell Rate from Bybit - Top 3 advertisers only
      id: cameroon_sell
      run: |
        DATA=$(curl -s -X POST "https://api2.bybit.com/fiat/otc/item/online" \
          -H "Content-Type: application/json" \
          -H "User-Agent: Mozilla/5.0" \
          -d '{
            "userId": "",
            "tokenId": "USDT",
            "currencyId": "XAF",
            "side": "0",
            "size": "10",
            "page": "1",
            "payment": ["111", "112"],
            "country": "CM"
          }')

        echo "Top 3 Cameroon advertisers:"
        echo "$DATA" | jq '.result.items[0:3] | 
          map({name: .advertiser.user.nickName, price: .price, amount: .surplusAmount})'

        AVG=$(echo "$DATA" | jq '[.result.items[0:3] | 
                .[] | select(.status==1 and .advertiser?.user?.advertising==false) | 
                (.price | tonumber)] | 
                if length > 0 then add / length else 560 end')

        echo "Cameroon Rate: $AVG XAF*5%"
        echo "xaf_avg=$AVG" >> $GITHUB_OUTPUT

    - name: Calculate Final Rate
      id: calculate
      run: |
        CAD_RATE=${{ steps.canada_buy.outputs.cad_rate }}
        XAF_AVG=${{ steps.cameroon_sell.outputs.xaf_avg }}

        GROSS_RATE=$(echo "scale=4; $XAF_AVG / $CAD_RATE" | bc -l)
        FINAL_RATE=$(echo "scale=2; $GROSS_RATE * 0.97" | bc -l)

        echo "Final Rate: $FINAL_RATE XAF/CAD"
        echo "final_rate=$FINAL_RATE" >> $GITHUB_OUTPUT

    - name: Send to Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        MESSAGE="<b>💱 Taux Bybit P2P Canada → Cameroun</b>%0A%0A"
        MESSAGE+="Canada Achat: ${{ steps.canada_buy.outputs.cad_rate }} CAD%0A"
        MESSAGE+="Cameroun Vente: ${{ steps.cameroon_sell.outputs.xaf_avg }} XAF%0A"
        MESSAGE+="<b>💰 Taux plaisir -3%:</b> ${{ steps.calculate.outputs.final_rate }} XAF/CAD"

        RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="$MESSAGE" \
          -d parse_mode="HTML")

        echo "Telegram response:"
        echo "$RESPONSE"
