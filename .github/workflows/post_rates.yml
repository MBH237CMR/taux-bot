name: Taux CAD-XAF

on:
  schedule:
    - cron: '0 * * * *'  # Toutes les 3h
  workflow_dispatch:  # Bouton pour lancer manuellement

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install pyTelegramBotAPI requests beautifulsoup4
          
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}  # AJOUTE CETTE LIGNE
        run: python bot.py
