name: Post Arbitrage Canada-Cameroun
on:
  schedule:
    - cron: '0 */1 * * *' # Toutes les heures
  workflow_dispatch:

jobs:
  arbitrage:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Get Canada USDT/CAD P2P data
        id: canada
        run: |
          DATA=$(curl -s -f -X POST https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search \
            -H "Content-Type: application/json" \
            -d '{"asset":"USDT","fiat":"CAD","merchantCheck":false,"page":1,"rows":10,"tradeType":"BUY","countries":[],"proMerchantAds":false,"publisherType":null}')
          if [ $? -ne 0 ]; then echo "Erreur curl Canada"; exit 1; fi
          AVG=$(echo "$DATA" | jq '[.data[] | select(.adv.isPromoted == false)] | .[0:5] | map((.adv.price | tonumber) * (.adv.surplusAmount | tonumber)) | add / map(.adv.surplusAmount | tonumber) | add')
          echo "avg=$AVG" >> $GITHUB_OUTPUT

      - name: Get Cameroon USDT/XAF P2P data
        id: cameroon
        run: |
          DATA=$(curl -s -f -X POST https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search \
            -H "Content-Type: application/json" \
            -d '{"asset":"USDT","fiat":"XAF","merchantCheck":false,"page":1,"rows":10,"tradeType":"SELL","countries":["CM"],"proMerchantAds":false,"publisherType":null}')
          if [ $? -ne 0 ]; then echo "Erreur curl Cameroun"; exit 1; fi
          AVG=$(echo "$DATA" | jq '[.data[] | select(.adv.isPromoted == false)] | .[0:5] | map((.adv.price | tonumber) * (.adv.surplusAmount | tonumber)) | add / map(.adv.surplusAmount | tonumber) | add')
          echo "avg=$AVG" >> $GITHUB_OUTPUT

      - name: Calculate and send to Telegram
        run: |
          CAD_RATE=${{ steps.canada.outputs.avg }}
          XAF_RATE=${{ steps.cameroon.outputs.avg }}
          if [ -z "$CAD_RATE" ] || [ -z "$XAF_RATE" ]; then
            echo "Erreur: pas de données"
            exit 1
          fi
          RAW_RATE=$(echo "scale=4; $XAF_RATE / $CAD_RATE" | bc -l)
          FINAL_RATE=$(echo "scale=2; $RAW_RATE * 0.97" | bc -l)
          MESSAGE="💱 Arbitrage Canada → Cameroun\n1 CAD = ${FINAL_RATE} XAF\nTaux Canada: ${CAD_RATE} CAD/USDT\nTaux Cameroun: ${XAF_RATE} XAF/USDT\nMarge appliquée: 3%\nMise à jour: $(TZ=Africa/Douala date '+%H:%M')"
          curl -s -X POST "https:                                                                      
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE"
