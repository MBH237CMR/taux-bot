name: Post Rates Canada to Cameroon

on:
  schedule:
    - cron: '0 * * * *' # toutes les heures
  workflow_dispatch:

jobs:
  update_rates:
    runs-on: ubuntu-latest

    steps:
    - name: Get Canada USDT/CAD Buy Rate
      id: canada_buy
      run: |
        DATA=$(curl -s -f -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
          -H "Content-Type: application/json" \
          -H "User-Agent: Mozilla/5.0" \
          -d '{
            "asset": "USDT",
            "fiat": "CAD",
            "tradeType": "BUY",
            "page": 1,
            "rows": 10
          }')

        AVG=$(echo "$DATA" | jq '[.data[] | select(.adv.advertisementActivateStatus=="ON") | 
                {price: (.adv.price | tonumber), amount: (.adv.tradableQuantity | tonumber)}] | 
                map(.price * .amount) | add / map(.amount) | add')

        echo "Canada Rate: $AVG CAD"
        echo "cad_rate=$AVG" >> $GITHUB_OUTPUT

